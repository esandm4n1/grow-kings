<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="description" content="Fukui Kings · 小学生プロ志望バスケ選手のための成長サポートアプリ" />
    <title>GROW · FUKUI KINGS</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />

    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GROW" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./icon-192.png" />
    <script type="module" crossorigin src="./assets/index-BNg0DJea.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-C5s8qkv-.css">
  </head>
  <body>
    <div id="root"></div>

    <!-- 恐竜モードへの導線（画面上部に大きく配置） -->
    <a href="./dino.html" id="dino-link" style="
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99999;
      background: linear-gradient(135deg, #FFC83A 0%, #FF8800 100%);
      color: #000;
      padding: 10px 20px;
      border-radius: 30px;
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6), 0 0 16px rgba(255,200,58,0.6);
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
      border: 2px solid rgba(255,255,255,0.3);
      animation: dinoPulse 2s ease-in-out infinite;
      white-space: nowrap;
    " onmousedown="this.style.transform='translateX(-50%) scale(0.95)'" onmouseup="this.style.transform='translateX(-50%) scale(1)'" ontouchstart="this.style.transform='translateX(-50%) scale(0.95)'" ontouchend="this.style.transform='translateX(-50%) scale(1)'">
      <span style="font-size:20px;">🦖</span>
      <span>恐竜モード</span>
    </a>
    <style>
      @keyframes dinoPulse {
        0%, 100% { box-shadow: 0 4px 16px rgba(0,0,0,0.6), 0 0 16px rgba(255,200,58,0.6); }
        50% { box-shadow: 0 4px 16px rgba(0,0,0,0.6), 0 0 24px rgba(255,200,58,1); }
      }
    </style>

    <!-- Register service worker for PWA (offline support) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(err => {
            console.log('SW registration failed:', err)
          })
        })
      }
      
      // 恐竜モードボタンを生成・維持する関数
      function ensureDinoButton() {
        if (document.getElementById('dino-link')) return;
        const a = document.createElement('a');
        a.id = 'dino-link';
        a.href = './dino.html';
        a.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:99999;background:linear-gradient(135deg,#FFC83A 0%,#FF8800 100%);color:#000;padding:10px 20px;border-radius:30px;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;font-weight:bold;box-shadow:0 4px 16px rgba(0,0,0,0.6),0 0 16px rgba(255,200,58,0.6);display:flex;align-items:center;gap:8px;-webkit-tap-highlight-color:transparent;border:2px solid rgba(255,255,255,0.3);animation:dinoPulse 2s ease-in-out infinite;white-space:nowrap;';
        a.innerHTML = '<span style="font-size:20px;">🦖</span><span>恐竜モード</span>';
        document.body.appendChild(a);
      }
      
      // 初回 + Reactの再レンダリングに対応するため定期的にチェック
      window.addEventListener('load', () => {
        ensureDinoButton();
        setInterval(ensureDinoButton, 1000);
      });
    </script>
  </body>
</html>

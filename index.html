<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="description" content="Fukui Kings · 小学生プロ志望バスケ選手のための成長サポートアプリ" />
    <title>GROW · FUKUI KINGS</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />

    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GROW" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./icon-192.png" />
    <script type="module" crossorigin src="./assets/index-BNg0DJea.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-C5s8qkv-.css">
  </head>
  <body>
    <div id="root"></div>

    <!-- Register service worker for PWA (offline support) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(err => {
            console.log('SW registration failed:', err)
          })
        })
      }
      
      // 恐竜モードボタンを生成・維持する関数
      function ensureDinoButton() {
        if (document.getElementById('dino-link')) return;
        const a = document.createElement('a');
        a.id = 'dino-link';
        a.href = './dino.html';
        a.title = '恐竜モード';
        a.style.cssText = 'position:fixed;top:14px;right:54px;z-index:99999;width:32px;height:32px;border-radius:50%;background:rgba(255,200,58,0.15);border:1px solid rgba(255,200,58,0.4);display:flex;align-items:center;justify-content:center;text-decoration:none;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px);transition:all 0.2s;';
        a.innerHTML = '<span style="font-size:18px;line-height:1;">🦖</span>';
        a.onmouseenter = () => { a.style.background = 'rgba(255,200,58,0.3)'; a.style.transform = 'scale(1.1)'; };
        a.onmouseleave = () => { a.style.background = 'rgba(255,200,58,0.15)'; a.style.transform = 'scale(1)'; };
        document.body.appendChild(a);
      }
      
      // 初回 + Reactの再レンダリングに対応するため定期的にチェック
      window.addEventListener('load', () => {
        ensureDinoButton();
        setInterval(ensureDinoButton, 1000);
      });
    </script>
  </body>
</html>
